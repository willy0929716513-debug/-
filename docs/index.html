<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎾 Tennis Predictor</title>
<style>
:root{
  --bg:#0d0f14;
  --surface:#161920;
  --card:#1e2130;
  --border:#272b3e;
  --acc:#5b8dee;
  --green:#3dd68c;
  --red:#ef5454;
  --gold:#f5a623;
  --text:#dde1f0;
  --muted:#6b7499;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:15px}
a{color:var(--acc);text-decoration:none}
code{background:var(--surface);padding:2px 6px;border-radius:4px;font-size:.85em;font-family:monospace}

/* ─── HEADER ─── */
header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
}
header h1{font-size:1.1rem;font-weight:700;letter-spacing:-.3px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.run-status{display:flex;align-items:center;gap:7px;font-size:.78rem;color:var(--muted);margin-right:4px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.dot.running{background:var(--gold);animation:blink 1s infinite}
.dot.ok{background:var(--green)}
.dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:8px;
  font-size:.82rem;font-weight:600;
  border:none;cursor:pointer;transition:.15s;
}
.btn-primary{background:var(--acc);color:#fff}
.btn-primary:hover{filter:brightness(1.12)}
.btn-primary:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--muted)}
.btn-live{background:rgba(239,84,84,.15);color:var(--red);border:1px solid rgba(239,84,84,.35)}
.btn-live:hover{background:rgba(239,84,84,.28)}

/* ─── MODAL ─── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:200;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:28px 24px;
  width:min(460px,94vw);
}
.modal h2{font-size:1rem;font-weight:700;margin-bottom:16px}
.step{
  display:flex;gap:12px;align-items:flex-start;
  padding:10px 0;border-bottom:1px solid var(--border);
  font-size:.85rem;line-height:1.55;
}
.step:last-of-type{border-bottom:none}
.step-num{
  min-width:22px;height:22px;border-radius:50%;
  background:var(--acc);color:#fff;
  font-size:.72rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  margin-top:1px;
}
.step-text{color:var(--muted)}
.step-text b{color:var(--text)}
.input-group{margin-top:18px}
.input-group label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:6px}
.input-group input{
  width:100%;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;color:var(--text);font-size:.9rem;
  outline:none;transition:.15s;
}
.input-group input:focus{border-color:var(--acc)}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:22px;right:22px;z-index:300;
  padding:11px 18px;border-radius:10px;
  font-size:.85rem;font-weight:600;
  animation:slideUp .25s ease;
}
.toast.ok{background:#1f6b44;color:#fff;border:1px solid var(--green)}
.toast.err{background:#6b1f1f;color:#fff;border:1px solid var(--red)}
.toast.info{background:#1f3060;color:#fff;border:1px solid var(--acc)}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ─── LAYOUT ─── */
.page{max-width:900px;margin:0 auto;padding:20px 16px}

/* ─── STATS BAR ─── */
.stats-bar{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:10px;margin-bottom:24px;
}
.stat{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
}
.stat .lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.stat .num{font-size:1.4rem;font-weight:700}
.g{color:var(--green)}.r{color:var(--red)}.o{color:var(--gold)}

/* ─── SECTION TITLE ─── */
.sec-title{
  font-size:.75rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.section{margin-bottom:28px}

/* ─── DAY LABEL ─── */
.day-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.75rem;font-weight:700;
  padding:4px 10px;border-radius:6px;
  background:var(--surface);color:var(--muted);
  margin-bottom:10px;
}
.day-tag.today{background:rgba(61,214,140,.1);color:var(--green)}
.day-tag.tomorrow{background:rgba(91,141,238,.1);color:var(--acc)}
.day-group{margin-bottom:18px}

/* ─── PICK CARD ─── */
.pick{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:10px;
  overflow:hidden;transition:.15s;
}
.pick:hover{border-color:var(--acc)}
.pick.tier-A{border-top:3px solid var(--gold)}
.pick.tier-B{border-top:3px solid var(--acc)}
.pick.tier-C{border-top:3px solid var(--border)}

.pick-top{
  padding:14px 16px 10px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.star{font-size:1.1rem}
.matchup{font-size:1rem;font-weight:700;flex:1;min-width:0}
.vs{color:var(--muted);font-weight:400}

.tag{
  font-size:.7rem;font-weight:600;
  padding:3px 9px;border-radius:20px;
}
.tag.hard{background:rgba(52,152,219,.15);color:#5dade2;border:1px solid rgba(52,152,219,.3)}
.tag.clay{background:rgba(192,57,43,.15);color:#e87461;border:1px solid rgba(192,57,43,.3)}
.tag.grass{background:rgba(39,174,96,.15);color:#58d68d;border:1px solid rgba(39,174,96,.3)}
.tag.tour{background:var(--surface);color:var(--muted);border:1px solid var(--border)}

/* metrics row */
.pick-metrics{
  padding:6px 16px 10px;
  display:flex;gap:0;flex-wrap:wrap;
}
.metric{
  flex:1;min-width:90px;
  padding:6px 0;
  border-right:1px solid var(--border);
}
.metric:last-child{border-right:none}
.metric .m-lbl{font-size:.7rem;color:var(--muted);margin-bottom:3px}
.metric .m-val{font-size:.95rem;font-weight:700}

/* bet row */
.pick-bet{
  background:var(--surface);
  padding:11px 16px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  border-top:1px solid var(--border);
}
.bet-label{font-size:.72rem;color:var(--muted);margin-bottom:2px}
.bet-name{font-size:.95rem;font-weight:700;color:var(--gold)}
.bet-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.price{font-size:1.05rem;font-weight:700;color:var(--green)}
.edge-pill{
  font-size:.75rem;font-weight:600;
  padding:3px 9px;border-radius:20px;
  background:rgba(91,141,238,.15);color:var(--acc);
  border:1px solid rgba(91,141,238,.3);
}
.stake{font-size:.78rem;color:var(--muted)}

/* ─── LIVE ─── */
.live-card{
  background:var(--card);border:1px solid rgba(239,84,84,.3);
  border-radius:var(--radius);padding:13px 16px;
  margin-bottom:10px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.live-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--red);box-shadow:0 0 6px var(--red);
  animation:blink 1.2s infinite;flex-shrink:0;
}
.live-name{font-weight:600;flex:1}
.live-bet{font-size:.85rem;font-weight:600;color:var(--gold)}
.drift{font-size:.75rem;padding:3px 8px;border-radius:6px;font-weight:600}
.drift.up{background:rgba(61,214,140,.12);color:var(--green)}
.drift.dn{background:rgba(239,84,84,.12);color:var(--red)}

/* ─── HISTORY TABLE ─── */
.hist{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
table{width:100%;border-collapse:collapse}
thead th{
  font-size:.72rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.7px;
  padding:10px 14px;text-align:left;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
tbody td{padding:10px 14px;font-size:.85rem;border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
.W{color:var(--green);font-weight:700}
.L{color:var(--red);font-weight:700}
.P,.pend{color:var(--muted)}

.empty{text-align:center;padding:36px;color:var(--muted);font-size:.88rem;line-height:1.7}
.footer{text-align:center;font-size:.72rem;color:var(--muted);padding:20px 0 32px}

@media(max-width:580px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .metric{min-width:80px}
  .header-right .btn span{display:none}
  .run-status{display:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <span style="font-size:1.4rem">🎾</span>
  <h1>Tennis Predictor <small style="font-size:.65em;color:var(--muted);font-weight:400">v3</small></h1>
  <div class="header-right">
    <div class="run-status">
      <div class="dot" id="st-dot"></div>
      <span id="st-txt">—</span>
    </div>
    <button class="btn btn-live" id="btn-live" onclick="run('live')">&#128308; <span>場中更新</span></button>
    <button class="btn btn-primary" id="btn-run" onclick="run('full')">&#9889; <span>立即執行</span></button>
    <button class="btn btn-ghost" onclick="openSettings()">&#9881;&#65039;</button>
  </div>
</header>

<!-- SETTINGS MODAL -->
<div class="overlay" id="overlay" style="display:none" onclick="bgClose(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>⚙️ 設定 GitHub Token</h2>

    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">前往
        <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a><br>
        點 <b>Generate new token (classic)</b>
      </div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">勾選 <b>workflow</b> 權限（這樣才能觸發 Actions），<br>設定有效期後按 <b>Generate token</b></div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">複製以 <code>ghp_</code> 開頭的 token，<br>貼到下面儲存。Token 只存在你的瀏覽器裡，不會上傳。</div>
    </div>

    <div class="input-group">
      <label>Personal Access Token</label>
      <input type="password" id="tk-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxx" />
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="clearTk()">🗑 清除</button>
      <button class="btn btn-ghost" onclick="closeModal()">✕ 取消</button>
      <button class="btn btn-primary" onclick="saveTk()">✓ 儲存</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="page">

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat"><div class="lbl">已結算</div><div class="num" id="s-n">—</div></div>
    <div class="stat"><div class="lbl">勝率</div><div class="num" id="s-wr">—</div></div>
    <div class="stat"><div class="lbl">ROI</div><div class="num" id="s-roi">—</div></div>
    <div class="stat"><div class="lbl">損益</div><div class="num" id="s-pnl">—</div></div>
  </div>

  <!-- LIVE -->
  <div class="section" id="live-sec" style="display:none">
    <div class="sec-title">🔴 場中監控</div>
    <div id="live-list"></div>
  </div>

  <!-- PICKS -->
  <div class="section">
    <div class="sec-title">📌 今日推薦</div>
    <div id="picks"><div class="empty">載入中…</div></div>
  </div>

  <!-- HISTORY -->
  <div class="section">
    <div class="sec-title">📋 近期戰績</div>
    <div id="hist"></div>
  </div>

  <div class="footer" id="footer"></div>
</div>

<script>
const OWNER  = 'willy0929716513-debug';
const REPO   = '-';
const BRANCH = 'claude/tennis-prediction-model-OhNiO';
const WF     = 'tennis_bot.yml';
const SURF   = {clay:'🟤 紅土', grass:'🟢 草地', hard:'🔵 硬地'};

/* ── token ── */
const getTk  = ()=> localStorage.getItem('gh_tk') || '';
function saveTk(){
  const v = document.getElementById('tk-input').value.trim();
  if(!v){ toast('請貼上 Token','err'); return; }
  localStorage.setItem('gh_tk', v);
  closeModal();
  toast('Token 已儲存 ✅','ok');
}
function clearTk(){ localStorage.removeItem('gh_tk'); document.getElementById('tk-input').value=''; toast('已清除','info'); }
function openSettings(){
  const t=getTk(); document.getElementById('tk-input').value = t ? t.slice(0,10)+'…' : '';
  document.getElementById('overlay').style.display='flex';
}
function closeModal(){ document.getElementById('overlay').style.display='none'; }
function bgClose(e){ if(e.target.id==='overlay') closeModal(); }

/* ── toast ── */
function toast(msg, type='info'){
  const el=document.createElement('div');
  el.className=`toast ${type}`; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

/* ── trigger workflow ── */
async function run(mode='full'){
  const tk=getTk();
  if(!tk){ openSettings(); toast('請先設定 Token','err'); return; }
  const btn = mode==='live' ? document.getElementById('btn-live') : document.getElementById('btn-run');
  btn.disabled=true;
  try{
    const res = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WF}/dispatches`,
      { method:'POST',
        headers:{'Authorization':`Bearer ${tk}`,'Accept':'application/vnd.github+json',
                 'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
        body: JSON.stringify({ref:BRANCH, inputs:{mode}}) }
    );
    if(res.status===204){
      toast('已觸發！約 1–2 分鐘後完成 ✅','ok');
      setTimeout(()=>{ pollStatus(); load(); }, 9000);
    } else if(res.status===401){
      toast('Token 無效，請重新設定','err'); openSettings();
    } else if(res.status===403){
      toast('Token 缺少 workflow 權限（請重新產生）','err');
    } else {
      const j=await res.json().catch(()=>({}));
      toast('Error '+res.status+(j.message?' — '+j.message:''),'err');
    }
  } catch(e){ toast('網路錯誤：'+e.message,'err'); }
  finally{ setTimeout(()=>{ btn.disabled=false; },6000); }
}

/* ── run status ── */
async function pollStatus(){
  const tk=getTk(); if(!tk) return;
  try{
    const res = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?branch=${encodeURIComponent(BRANCH)}&per_page=1`,
      {headers:{'Authorization':`Bearer ${tk}`,'Accept':'application/vnd.github+json'}}
    );
    if(!res.ok) return;
    const j=await res.json();
    const run=(j.workflow_runs||[])[0]; if(!run) return;
    const dot=document.getElementById('st-dot'), txt=document.getElementById('st-txt');
    if(run.status==='completed'){
      const ok = run.conclusion==='success';
      dot.className='dot '+(ok?'ok':'err');
      txt.textContent = ok ? '上次執行成功 ✅' : '上次執行失敗 ❌';
    } else {
      dot.className='dot running';
      txt.textContent = run.status==='in_progress' ? '執行中…' : '排隊中…';
      setTimeout(pollStatus, 8000);
    }
  } catch(_){}
}

/* ── day label ── */
function dayLabel(iso){
  if(!iso) return {key:'?', label:'日期未知', cls:''};
  const toTWDate = t => new Date(t.getTime()+8*3600*1000).toISOString().slice(0,10);
  const d  = new Date(iso);
  const now = new Date();
  const md = toTWDate(d), td = toTWDate(now);
  const tom = toTWDate(new Date(now.getTime()+86400000));
  const aft = toTWDate(new Date(now.getTime()+2*86400000));
  if(md===td)  return {key:md, label:'今日',  cls:'today'};
  if(md===tom) return {key:md, label:'明日',  cls:'tomorrow'};
  if(md===aft) return {key:md, label:'後天',  cls:''};
  const [,m,dd]=md.split('-');
  return {key:md, label:`${+m}/${+dd}`, cls:''};
}

/* ── main load ── */
async function load(){
  let data;
  try{
    const r = await fetch('picks_latest.json?t='+Date.now());
    data = await r.json();
  } catch(e){
    document.getElementById('picks').innerHTML =
      '<div class="empty">⚠️ 無法載入資料<br><small>確認 picks_latest.json 是否已產生</small></div>';
    return;
  }

  /* footer */
  document.getElementById('footer').textContent = '最後更新：'+(data.generated_at||'—');

  /* stats */
  const st=data.stats||{};
  const wr=st.win_rate??0, roi=st.roi??0, pnl=st.pnl??0;
  q('s-n').textContent   = st.settled ?? '—';
  setNum('s-wr',  wr  ? wr.toFixed(1)+'%'  : '—', wr>=55?'g':'');
  setNum('s-roi', roi ? (roi>0?'+':'')+roi.toFixed(1)+'%' : '—', roi>0?'g':roi<0?'r':'');
  setNum('s-pnl', pnl ? (pnl>0?'+':'')+pnl.toFixed(0) : '—', pnl>0?'g':pnl<0?'r':'');

  /* live */
  const lives=(data.live_matches||[]).filter(m=>m.bet);
  q('live-sec').style.display = lives.length ? '' : 'none';
  q('live-list').innerHTML = lives.map(m=>{
    const d=m.drift||0;
    return `<div class="live-card">
      <div class="live-dot"></div>
      <div class="live-name">${m.home} vs ${m.away}</div>
      <div class="live-bet">${m.bet}</div>
      <span class="drift ${d>=0?'up':'dn'}">${d>0?'+':''}${d.toFixed(1)}%</span>
      <span style="font-size:.75rem;color:var(--muted)">${m.reason||''}</span>
    </div>`;
  }).join('');

  /* picks */
  const picks = data.picks||[];
  if(!picks.length){
    q('picks').innerHTML = '<div class="empty">今日無符合條件的推薦<br><small>模型尚未找到足夠邊際值的機會</small></div>';
  } else {
    const groups={};
    picks.forEach(p=>{
      const dl=dayLabel(p.commence);
      if(!groups[dl.key]) groups[dl.key]={meta:dl,items:[]};
      groups[dl.key].items.push(p);
    });
    q('picks').innerHTML = Object.values(groups).map(g=>{
      const cards = g.items.map(p=>{
        const surf = p.surface||'hard';
        const edge = p.edge != null ? `+${p.edge}%` : '—';
        const modelP  = p.model_p != null ? p.model_p+'%' : '—';
        const marketP = p.dv_p   != null ? p.dv_p+'%'   : '—';
        const svPct   = p.p1_sv_pct != null ? p.p1_sv_pct+'%' : '—';
        return `<div class="pick tier-${p.tier||'C'}">
          <div class="pick-top">
            <span class="star">${p.star||'⭐'}</span>
            <span class="matchup">${p.p1} <span class="vs">vs</span> ${p.p2}</span>
            <span class="tag ${surf}">${SURF[surf]||surf}</span>
            <span class="tag tour">${p.tour||''}</span>
          </div>
          <div class="pick-metrics">
            <div class="metric">
              <div class="m-lbl">模型勝率</div>
              <div class="m-val">${modelP}</div>
            </div>
            <div class="metric">
              <div class="m-lbl">市場隱含</div>
              <div class="m-val">${marketP}</div>
            </div>
            <div class="metric">
              <div class="m-lbl">優勢 Edge</div>
              <div class="m-val g">${edge}</div>
            </div>
            <div class="metric">
              <div class="m-lbl">發球得分率</div>
              <div class="m-val">${svPct}</div>
            </div>
          </div>
          <div class="pick-bet">
            <div>
              <div class="bet-label">推薦投注</div>
              <div class="bet-name">${p.bet_on||'—'}</div>
            </div>
            <div class="bet-right">
              <span class="price">@ ${p.best_price||'—'}</span>
              <span class="edge-pill">edge ${edge}</span>
              <span class="stake">建議 $${p.stake||'—'}</span>
            </div>
          </div>
        </div>`;
      }).join('');
      return `<div class="day-group">
        <div class="day-tag ${g.meta.cls}">${g.meta.label}&nbsp;&nbsp;${g.meta.key}</div>
        ${cards}
      </div>`;
    }).join('');
  }

  /* history */
  const hist=data.recent_history||[];
  q('hist').innerHTML = hist.length
    ? `<div class="hist"><table>
        <thead><tr><th>日期</th><th>對陣</th><th>推薦</th><th>賠率</th><th>結果</th></tr></thead>
        <tbody>${hist.map(b=>{
          const r=b.result, lbl=r==='W'?'✅ 贏':r==='L'?'❌ 輸':r==='P'?'🔄 和':'⏳ 待定';
          return `<tr>
            <td>${b.date||'—'}</td>
            <td>${b.p1||b.home||'?'} vs ${b.p2||b.away||'?'}</td>
            <td style="color:var(--gold)">${b.bet_on||b.label||'—'}</td>
            <td>${b.price?'@'+b.price:'—'}</td>
            <td class="${r||'pend'}">${lbl}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`
    : '<div class="empty">尚無歷史紀錄</div>';
}

function q(id){ return document.getElementById(id); }
function setNum(id,text,cls=''){
  const el=q(id); el.textContent=text; el.className='num '+cls;
}

load();
pollStatus();
setInterval(load, 5*60*1000);
setInterval(pollStatus, 30*1000);
</script>
</body>
</html>
