name: Live Score Check

on:
  schedule:
    # 比賽前 1 小時觸發（UTC，台灣時間 = UTC+8）
    # 澳洲/亞洲賽區開賽 07:00 TW = 23:00 UTC → 提前 1hr = 22:00 UTC
    - cron: "0 22 * * *"
    # 歐洲賽區開賽 17:00 TW = 09:00 UTC → 提前 1hr = 08:00 UTC
    - cron: "0 8 * * *"
    # 北美賽區開賽 23:00 TW = 15:00 UTC → 提前 1hr = 14:00 UTC
    - cron: "0 14 * * *"
  workflow_dispatch:   # 手動觸發

jobs:
  live-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360   # 最多跑 6 小時

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Loop — 每 5 分鐘偵測，連續 3 次無比賽則停止
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          NTFY_TOPIC:   ${{ secrets.NTFY_TOPIC }}
          GH_TOKEN:     ${{ github.token }}
        run: |
          consecutive_empty=0
          max_empty=3

          while [ $consecutive_empty -lt $max_empty ]; do
            echo "=== 偵測開始 (連續空値: $consecutive_empty/$max_empty) ==="

            python live_update.py
            exit_code=$?

            if [ $exit_code -eq 0 ]; then
              # 有進行中比賽 → 重置計數，提交結果
              consecutive_empty=0
              git pull --rebase --autostash
              git add docs/picks_latest.json
              git diff --cached --quiet || \
                git commit -m "chore: live scores update [skip ci]" && \
                git push || echo "push failed, will retry next cycle"
              # Sync to main for GitHub Pages
              SHA=$(gh api repos/$GITHUB_REPOSITORY/contents/docs/picks_latest.json?ref=main --jq .sha 2>/dev/null || echo "")
              [ -n "$SHA" ] && gh api repos/$GITHUB_REPOSITORY/contents/docs/picks_latest.json \
                --method PUT \
                -f message="chore: live scores update [skip ci]" \
                -f "content=$(base64 -w 0 docs/picks_latest.json)" \
                -f sha="$SHA" \
                -f branch="main" || echo "sync to main failed"
            else
              # 無比賽 → 累計
              consecutive_empty=$((consecutive_empty + 1))
              echo "無進行中比賽 ($consecutive_empty/$max_empty)"
            fi

            if [ $consecutive_empty -lt $max_empty ]; then
              echo "等待 5 分鐘..."
              sleep 300
            fi
          done

          echo "連續 $max_empty 次無比賽，結束偵測。"
