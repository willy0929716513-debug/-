name: Tennis Bot

on:
  workflow_dispatch:
  schedule:
    # 各區開賽前 90 分鐘觸發（含 GitHub Actions 最長 ~60 分延遲仍安全）
    - cron: '30 6 * * *'   # TW 14:30 — 法網/溫網早場（開賽 08:00 UTC）
    - cron: '30 8 * * *'   # TW 16:30 — 法網/溫網午場（開賽 10:00 UTC）
    - cron: '30 13 * * *'  # TW 21:30 — 美網早場（開賽 15:00 UTC）
    - cron: '30 17 * * *'  # TW 01:30 — 美網午場（開賽 19:00 UTC）
    - cron: '30 21 * * *'  # TW 05:30 — 澳網早場（開賽 23:00 UTC）

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Tennis Bot
        env:
          ODDS_API_KEY:    ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GIST_TOKEN:      ${{ secrets.GIST_TOKEN }}
          GIST_ID:         ${{ secrets.GIST_ID }}
          NTFY_TOPIC:      ${{ secrets.NTFY_TOPIC }}
        run: python tennis_bot.py

      - name: Commit updated picks
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/picks_latest.json /tmp/picks_new.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/picks_new.json docs/picks_latest.json
          git add docs/picks_latest.json
          git diff --cached --quiet || git commit -m "chore: update tennis picks [skip ci]"
          git push origin HEAD:main

      - name: Sync picks to main (GitHub Pages)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -f docs/picks_latest.json ] || exit 0
          SHA=$(gh api repos/$GITHUB_REPOSITORY/contents/docs/picks_latest.json?ref=main --jq .sha 2>/dev/null || echo "")
          [ -z "$SHA" ] && exit 0
          gh api repos/$GITHUB_REPOSITORY/contents/docs/picks_latest.json \
            --method PUT \
            -f message="chore: update tennis picks [skip ci]" \
            -f "content=$(base64 -w 0 docs/picks_latest.json)" \
            -f sha="$SHA" \
            -f branch="main" || echo "Warning: could not sync picks to main"
